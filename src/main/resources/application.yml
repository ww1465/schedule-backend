# 端口：本地默认8080，部署时使用环境变量 PORT
server:
  port: ${PORT:8080}

spring:
  datasource:
    # SQLite 文件路径：本地用 ./data/schedule.db，部署时通过环境变量 DB_PATH 覆盖
    url: jdbc:sqlite:${DB_PATH:./schedule.db}
    driver-class-name: org.sqlite.JDBC

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

# 微信配置：敏感信息全部从环境变量读取
wx:
  app-id: ${WX_APP_ID:}
  app-secret: ${WX_APP_SECRET:}
  code2session-url: https://api.weixin.qq.com/sns/jscode2session
